<!doctype html>
<html lang="pt-br">
  <head>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get("redirect");
        if (redirect) {
          window.history.replaceState(null, "", redirect);
        }
      })();
    </script>

    <meta charset="utf-8" />
    <link rel="icon" href="/Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Site de planejamento de estudos e simulados Enem"
    />
    <!-- Open Graph -->
    <meta property="og:title" content="Learnly - Planejamento de Estudos" />
    <meta
      property="og:description"
      content="Planeje seus estudos para o Enem com simulados e organização inteligente."
    />
    <meta
      property="og:image"
      content="https://learnly-edu.vercel.app/Logo.png"
    />
    <meta property="og:url" content="https://learnly-edu.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Learnly" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter (funciona para outras redes também) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Learnly - Planejamento de Estudos" />
    <meta
      name="twitter:description"
      content="Planeje seus estudos para o Enem com simulados e organização inteligente."
    />
    <meta
      name="twitter:image"
      content="https://learnly-edu.vercel.app/Logo.png"
    />
    <link rel="apple-touch-icon" href="/Logo.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Learnly</title>
  </head>
  <body>
    <noscript>Você precisa ativar o JavaScript para usar esse site.</noscript>
    <div id="root"></div>

  </body>
</html>
